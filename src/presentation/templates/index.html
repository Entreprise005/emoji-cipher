<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Cipher ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --secondary: #ec4899;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, var(--bg-dark), #020617);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .blob-1, .blob-2 {
            position: absolute;
            filter: blur(100px);
            z-index: 0;
            border-radius: 50%;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: rgba(139, 92, 246, 0.4);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: rgba(236, 72, 153, 0.4);
            bottom: -50px;
            right: -50px;
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .tabs {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            padding: 0.5rem;
            margin-bottom: 2rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-light);
            font-weight: 600;
        }

        textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-family: inherit;
            font-size: 1.1rem;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .action-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 2rem;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .result-box {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 1.5rem;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            word-break: break-all;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .result-box.visible {
            opacity: 1;
            transform: scale(1);
        }

        .empty-state {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div class="container">
        <header>
            <h1>Emoji Cipher</h1>
            <p class="subtitle">Transforme seus textos em mensagens secretas!</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="tab-encrypt" onclick="switchMode('encrypt')">Criptografar 🔒</button>
            <button class="tab-btn" id="tab-decrypt" onclick="switchMode('decrypt')">Descriptografar 🔓</button>
        </div>

        <div class="input-group">
            <label id="input-label" for="input-text">Digite o texto para criptografar:</label>
            <textarea id="input-text" placeholder="Ex: Ola mundo"></textarea>
        </div>

        <button class="action-btn" id="action-btn" onclick="process()">Converter 🚀</button>

        <div class="input-group">
            <label>Resultado:</label>
            <div class="result-box" id="result-box">
                <span class="empty-state">O resultado aparecerá aqui...</span>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'encrypt';

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-encrypt').classList.toggle('active', mode === 'encrypt');
            document.getElementById('tab-decrypt').classList.toggle('active', mode === 'decrypt');
            
            document.getElementById('input-label').innerText = mode === 'encrypt' 
                ? 'Digite o texto para criptografar:' 
                : 'Cole os emojis para descriptografar:';
                
            document.getElementById('input-text').placeholder = mode === 'encrypt'
                ? 'Ex: Ola mundo'
                : 'Ex: 🍎🍌🐱';

            document.getElementById('input-text').value = '';
            hideResult();
        }

        function hideResult() {
            const box = document.getElementById('result-box');
            box.classList.remove('visible');
            setTimeout(() => {
                box.innerHTML = '<span class="empty-state">O resultado aparecerá aqui...</span>';
                box.classList.add('visible');
            }, 300);
        }

        async function process() {
            const input = document.getElementById('input-text').value;
            if (!input) return;

            const endpoint = currentMode === 'encrypt' ? '/encrypt' : '/decrypt';
            const payload = currentMode === 'encrypt' ? { text: input } : { emojis: input };

            const btn = document.getElementById('action-btn');
            const originalText = btn.innerText;
            btn.innerText = 'Processando... ⏳';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                const box = document.getElementById('result-box');
                box.classList.remove('visible');
                
                setTimeout(() => {
                    if (data.result === "") {
                        box.innerHTML = '<span class="empty-state">Nenhum caractere válido encontrado.</span>';
                    } else {
                        box.innerText = data.result || data.error;
                    }
                    box.classList.add('visible');
                }, 300);

            } catch (error) {
                alert('Erro ao conectar com o servidor.');
            } finally {
                btn.innerText = originalText;
            }
        }
    </script>
</body>
</html>
