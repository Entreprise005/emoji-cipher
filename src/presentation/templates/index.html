<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Cipher ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div class="container">
        <header>
            <h1>Emoji Cipher</h1>
            <p class="subtitle">Transforme seus textos em mensagens secretas!</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="tab-encrypt" onclick="switchMode('encrypt')">Criptografar 🔒</button>
            <button class="tab-btn" id="tab-decrypt" onclick="switchMode('decrypt')">Descriptografar 🔓</button>
        </div>

        <div class="input-group">
            <label id="input-label" for="input-text">Digite o texto para criptografar:</label>
            <textarea id="input-text" placeholder="Ex: Ola mundo"></textarea>
        </div>

        <button class="action-btn" id="action-btn" onclick="process()">Converter 🚀</button>

        <div class="input-group">
            <label>Resultado:</label>
            <div class="result-box" id="result-box">
                <span class="empty-state">O resultado aparecerá aqui...</span>
            </div>
        </div>
        <div class="input-group" style="margin-top: 2rem;">
            <label>Dicionário:</label>
            <div class="dict-inline-box">
                {% for char, emoji in mapping.items() %}
                <span class="dict-inline-item" title="{{ char }}"><strong>{{ char }}</strong>={{ emoji }}</span>
                {% endfor %}
                <span class="dict-inline-item" title="Espaço"><strong>[ ]</strong>={{ space }}</span>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
